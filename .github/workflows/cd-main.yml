name: CD — Release (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Версия релиза (например: 1.0.0)"
        required: true
        default: "1.0.0"
      prerelease:
        description: "Пре-релиз?"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════
  #  BACKEND — нагрузочный тест + сборка бинарника
  # ═══════════════════════════════════════════════
  backend-build:
    name: 🐍 Backend — Build & Load Test (${{ matrix.os-name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os-name: Linux
            binary-name: backend-x86_64-unknown-linux-gnu
          - os: windows-latest
            os-name: Windows
            binary-name: backend-x86_64-pc-windows-msvc.exe

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install PyInstaller
        run: pip install pyinstaller

      # Используем backend.spec — он содержит все hiddenimports (migrate, bcrypt, jose и др.)
      - name: Build backend binary
        run: pyinstaller backend.spec --clean --distpath dist

      - name: Rename binary for Tauri sidecar
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            mv dist/backend.exe dist/${{ matrix.binary-name }}
          else
            mv dist/backend dist/${{ matrix.binary-name }}
          fi

      # Генерируем чистую seed-БД со всеми таблицами и системным аккаунтом.
      # Если timetable.db уже есть в репозитории — используем его как есть.
      # Seed-БД копируется в dist/ и потом Tauri бандлит её как resource.
      # database.py при первом запуске на новой машине скопирует её в AppData.
      - name: Generate seed database
        shell: bash
        run: |
          if [ -f "timetable.db" ]; then
            echo "✅ timetable.db found in repo, using it as seed"
            cp timetable.db dist/timetable.db
          else
            echo "⚠️ timetable.db not in repo — generating fresh seed DB"
            python -c "
          from database import SessionLocal, Base, engine
          from models import Account
          from main import hash_password
          import os, shutil
          Base.metadata.create_all(bind=engine)
          db = SessionLocal()
          existing = db.query(Account).filter(Account.username == 'admin').first()
          if not existing:
              acc = Account(username='admin', password_hash=hash_password('admin'))
              db.add(acc)
              db.commit()
              print('✅ Default admin account created (change password after first login!)')
          db.close()
          "
            cp timetable.db dist/timetable.db
            echo "✅ Fresh seed DB created and copied to dist/"
          fi

      - name: Run load test (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pip install locust
          # Запускаем бинарник с явными путями к БД и медиа
          # (PyInstaller-бинарник стартует медленнее обычного Python, даём 15 сек)
          DB_PATH=/tmp/test_timetable.db \
          MEDIA_DIR=/tmp/test_media \
          ./dist/${{ matrix.binary-name }} &
          echo "Waiting for backend to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "✅ Backend is up after ${i}s"
              break
            fi
            sleep 1
          done
          python -c "
          import os
          os.environ['DB_PATH'] = '/tmp/test_timetable.db'
          from database import SessionLocal, Base, engine
          from models import Account
          from main import hash_password
          Base.metadata.create_all(bind=engine)
          db = SessionLocal()
          existing = db.query(Account).filter(Account.username == '${{ secrets.BACKEND_TEST_USERNAME }}').first()
          if not existing:
              acc = Account(
                  username='${{ secrets.BACKEND_TEST_USERNAME }}',
                  password_hash=hash_password('${{ secrets.BACKEND_TEST_PASSWORD }}')
              )
              db.add(acc)
              db.commit()
          db.close()
          " || echo "⚠️ DB init skipped"
          locust -f tests/locustfile.py \
            --headless \
            --users 100 \
            --spawn-rate 20 \
            --run-time 60s \
            --host http://localhost:8000 \
            --html load-report.html \
            --csv load-stats || echo "⚠️ Load test skipped"
        continue-on-error: true
        env:
          BACKEND_TEST_USERNAME: ${{ secrets.BACKEND_TEST_USERNAME }}
          BACKEND_TEST_PASSWORD: ${{ secrets.BACKEND_TEST_PASSWORD }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary-${{ matrix.os-name }}-${{ github.sha }}
          path: |
            backend/dist/${{ matrix.binary-name }}
            backend/dist/timetable.db
          retention-days: 1

      - name: Upload load test results
        uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-latest'
        with:
          name: backend-load-report-${{ github.sha }}
          path: |
            backend/load-report.html
            backend/load-stats*.csv
          retention-days: 30

  # ═══════════════════════════════════════════════
  #  FRONTEND — сборка Tauri под Windows и Linux
  # ═══════════════════════════════════════════════
  frontend-build-exe:
    name: ⚛️ Frontend — Build Tauri (${{ matrix.os-name }})
    runs-on: ${{ matrix.os }}
    needs: backend-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os-name: Windows
            binary-name: backend-x86_64-pc-windows-msvc.exe
            artifact-path: |
              frontend/src-tauri/target/release/bundle/msi/*.msi
              frontend/src-tauri/target/release/bundle/nsis/*.exe
            artifact-name: frontend-windows
          - os: ubuntu-latest
            os-name: Linux
            binary-name: backend-x86_64-unknown-linux-gnu
            artifact-path: |
              frontend/src-tauri/target/release/bundle/deb/*.deb
              frontend/src-tauri/target/release/bundle/appimage/*.AppImage
            artifact-name: frontend-linux

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download backend binary
        uses: actions/download-artifact@v4
        with:
          name: backend-binary-${{ matrix.os-name }}-${{ github.sha }}
          path: frontend/src-tauri/binaries/

      - name: Fix binary permissions (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: chmod +x src-tauri/binaries/${{ matrix.binary-name }}

      - name: Copy bundled database to binaries folder
        shell: bash
        run: |
          if [ -f src-tauri/binaries/timetable.db ]; then
            echo "✅ timetable.db found in binaries/"
          else
            echo "⚠️ timetable.db not found, app will start with empty database"
          fi

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./frontend/src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.FRONTEND_TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.FRONTEND_TAURI_KEY_PASSWORD }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-${{ github.sha }}
          path: ${{ matrix.artifact-path }}
          retention-days: 30

  # ═══════════════════════════════════════════════
  #  ADMIN PANEL — сборка Tauri под Windows и Linux
  # ═══════════════════════════════════════════════
  admin-build-exe:
    name: 🖥️ Admin Panel — Build Tauri (${{ matrix.os-name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os-name: Windows
            artifact-path: |
              admin-panel/src-tauri/target/release/bundle/msi/*.msi
              admin-panel/src-tauri/target/release/bundle/nsis/*.exe
            artifact-name: admin-windows
          - os: ubuntu-latest
            os-name: Linux
            artifact-path: |
              admin-panel/src-tauri/target/release/bundle/deb/*.deb
              admin-panel/src-tauri/target/release/bundle/appimage/*.AppImage
            artifact-name: admin-linux

    defaults:
      run:
        working-directory: admin-panel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: admin-panel/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./admin-panel/src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.ADMIN_TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.ADMIN_TAURI_KEY_PASSWORD }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-${{ github.sha }}
          path: ${{ matrix.artifact-path }}
          retention-days: 30

  # ═══════════════════════════════════════════════
  #  RELEASE — создаём GitHub Release
  # ═══════════════════════════════════════════════
  release:
    name: 🚀 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [frontend-build-exe, admin-build-exe]
    if: always() && (needs.frontend-build-exe.result == 'success' || needs.admin-build-exe.result == 'success')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Determine version and tag
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "tag=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "name=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "prerelease=${{ github.event.inputs.prerelease }}" >> $GITHUB_OUTPUT
          else
            SHORT=$(echo ${{ github.sha }} | cut -c1-7)
            echo "tag=release-${SHORT}" >> $GITHUB_OUTPUT
            echo "name=Release ${SHORT}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          body: |
            ## 🚀 Релиз ${{ steps.version.outputs.name }}

            **Коммит:** ${{ github.sha }}
            **Дата:** ${{ github.event.head_commit.timestamp }}
            **Сообщение:** ${{ github.event.head_commit.message }}

            ### Содержимое:
            - 🖥️ Admin Panel — Windows (`.exe`, `.msi`) и Linux (`.deb`, `.AppImage`)
            - ⚛️ Frontend — Windows (`.exe`, `.msi`) и Linux (`.deb`, `.AppImage`)
            - 🐍 Backend встроен в Frontend

            ### Нагрузочные тесты:
            Отчёт доступен в разделе **Actions → Artifacts**
          files: |
            release-assets/**/*.exe
            release-assets/**/*.msi
            release-assets/**/*.deb
            release-assets/**/*.AppImage
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
