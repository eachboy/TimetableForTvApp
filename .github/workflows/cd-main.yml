name: CD — Release (main)

on:
  push:
    branches:
      - main

jobs:
  # ═══════════════════════════════════════════════
  #  BACKEND — FastAPI нагрузочный тест
  # ═══════════════════════════════════════════════
  backend-load-test:
    name: 🐍 Backend — Full Load Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx locust

      - name: Run unit tests
        run: pytest tests/ -v --tb=short || echo "⚠️ Skipping"

      - name: Start FastAPI server
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5
        continue-on-error: true

      - name: Run full load test (100 users, 60s)
        run: |
          locust -f tests/locustfile.py \
            --headless \
            --users 100 \
            --spawn-rate 20 \
            --run-time 60s \
            --host http://localhost:8000 \
            --html load-report.html \
            --csv load-stats || echo "⚠️ Skipping"
        continue-on-error: true

      - name: Upload load test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-load-report-${{ github.sha }}
          path: |
            backend/load-report.html
            backend/load-stats*.csv
          retention-days: 30

  # ═══════════════════════════════════════════════
  #  FRONTEND — сборка Tauri .exe
  # ═══════════════════════════════════════════════
  frontend-build-exe:
    name: ⚛️ Frontend — Build Tauri .exe
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./frontend/src-tauri -> target"

      - name: Install Node dependencies
        run: npm ci

      - name: Run frontend load test (k6)
        uses: grafana/k6-action@v0.3.1
        with:
          filename: frontend/tests/load-test.js
        continue-on-error: true

      - name: Build Tauri app (.exe)
        run: npm run tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.FRONTEND_TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.FRONTEND_TAURI_KEY_PASSWORD }}

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-exe-${{ github.sha }}
          path: |
            frontend/src-tauri/target/release/bundle/msi/*.msi
            frontend/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

  # ═══════════════════════════════════════════════
  #  ADMIN PANEL — сборка Tauri .exe
  # ═══════════════════════════════════════════════
  admin-build-exe:
    name: 🖥️ Admin Panel — Build Tauri .exe
    runs-on: windows-latest
    defaults:
      run:
        working-directory: admin-panel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: admin-panel/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./admin-panel/src-tauri -> target"

      - name: Install Node dependencies
        run: npm ci

      - name: Run admin-panel load test (k6)
        uses: grafana/k6-action@v0.3.1
        with:
          filename: admin-panel/tests/load-test.js
        continue-on-error: true

      - name: Build Tauri app (.exe)
        run: npm run tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.ADMIN_TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.ADMIN_TAURI_KEY_PASSWORD }}

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-panel-exe-${{ github.sha }}
          path: |
            admin-panel/src-tauri/target/release/bundle/msi/*.msi
            admin-panel/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

  # ═══════════════════════════════════════════════
  #  RELEASE — создаём GitHub Release со всеми .exe
  # ═══════════════════════════════════════════════
  release:
    name: 🚀 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [backend-load-test, frontend-build-exe, admin-build-exe]
    if: always() && (needs.frontend-build-exe.result == 'success' || needs.admin-build-exe.result == 'success')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ steps.sha.outputs.short }}
          name: "Release ${{ steps.sha.outputs.short }}"
          body: |
            ## 🚀 Автоматический релиз

            **Коммит:** ${{ github.sha }}
            **Дата:** ${{ github.event.head_commit.timestamp }}
            **Сообщение:** ${{ github.event.head_commit.message }}

            ### Содержимое:
            - 🖥️ Admin Panel `.exe` / `.msi`
            - ⚛️ Frontend `.exe` / `.msi`

            ### Нагрузочные тесты:
            Отчёт доступен в разделе **Actions → Artifacts**
          files: release-assets/**/*.{exe,msi}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}