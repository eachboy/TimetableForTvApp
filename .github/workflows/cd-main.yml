name: CD — Release (main)

on:
  push:
    branches:
      - main

jobs:
  # ═══════════════════════════════════════════════
  #  BACKEND — FastAPI нагрузочный тест
  # ═══════════════════════════════════════════════
  backend-load-test:
    name: 🐍 Backend — Full Load Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx locust

      - name: Run unit tests
        run: pytest tests/ -v --tb=short || echo "⚠️ Skipping"

      - name: Start FastAPI server
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5
        continue-on-error: true

      - name: Create test user in DB
        run: |
          python -c "
          from database import SessionLocal, Base, engine
          from models import Account
          from main import hash_password
          Base.metadata.create_all(bind=engine)
          db = SessionLocal()
          existing = db.query(Account).filter(Account.username == '${{ secrets.BACKEND_TEST_USERNAME }}').first()
          if not existing:
              acc = Account(
                  username='${{ secrets.BACKEND_TEST_USERNAME }}',
                  password_hash=hash_password('${{ secrets.BACKEND_TEST_PASSWORD }}')
              )
              db.add(acc)
              db.commit()
              print('✅ Test user created')
          else:
              print('✅ Test user already exists')
          db.close()
          "
        continue-on-error: true

      - name: Run full load test (100 users, 60s)
        run: |
          locust -f tests/locustfile.py \
            --headless \
            --users 100 \
            --spawn-rate 20 \
            --run-time 60s \
            --host http://localhost:8000 \
            --html load-report.html \
            --csv load-stats || echo "⚠️ Skipping"
        continue-on-error: true
        env:
          BACKEND_TEST_USERNAME: ${{ secrets.BACKEND_TEST_USERNAME }}
          BACKEND_TEST_PASSWORD: ${{ secrets.BACKEND_TEST_PASSWORD }}

      - name: Upload load test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-load-report-${{ github.sha }}
          path: |
            backend/load-report.html
            backend/load-stats*.csv
          retention-days: 30

  # ═══════════════════════════════════════════════
  #  FRONTEND — сборка Tauri под Windows и Linux
  # ═══════════════════════════════════════════════
  frontend-build-exe:
    name: ⚛️ Frontend — Build Tauri (${{ matrix.os-name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os-name: Windows
            artifact-path: |
              frontend/src-tauri/target/release/bundle/msi/*.msi
              frontend/src-tauri/target/release/bundle/nsis/*.exe
            artifact-name: frontend-windows
          - os: ubuntu-latest
            os-name: Linux
            artifact-path: |
              frontend/src-tauri/target/release/bundle/deb/*.deb
              frontend/src-tauri/target/release/bundle/appimage/*.AppImage
            artifact-name: frontend-linux

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./frontend/src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev

      - name: Run k6 load test (Linux only)
        if: matrix.os == 'ubuntu-latest'
        uses: grafana/k6-action@v0.3.1
        with:
          filename: frontend/tests/load-test.js
        continue-on-error: true

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.FRONTEND_TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.FRONTEND_TAURI_KEY_PASSWORD }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-${{ github.sha }}
          path: ${{ matrix.artifact-path }}
          retention-days: 30

  # ═══════════════════════════════════════════════
  #  ADMIN PANEL — сборка Tauri под Windows и Linux
  # ═══════════════════════════════════════════════
  admin-build-exe:
    name: 🖥️ Admin Panel — Build Tauri (${{ matrix.os-name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os-name: Windows
            artifact-path: |
              admin-panel/src-tauri/target/release/bundle/msi/*.msi
              admin-panel/src-tauri/target/release/bundle/nsis/*.exe
            artifact-name: admin-windows
          - os: ubuntu-latest
            os-name: Linux
            artifact-path: |
              admin-panel/src-tauri/target/release/bundle/deb/*.deb
              admin-panel/src-tauri/target/release/bundle/appimage/*.AppImage
            artifact-name: admin-linux

    defaults:
      run:
        working-directory: admin-panel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: admin-panel/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./admin-panel/src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev

      - name: Run k6 load test (Linux only)
        if: matrix.os == 'ubuntu-latest'
        uses: grafana/k6-action@v0.3.1
        with:
          filename: admin-panel/tests/load-test.js
        continue-on-error: true

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.ADMIN_TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.ADMIN_TAURI_KEY_PASSWORD }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-${{ github.sha }}
          path: ${{ matrix.artifact-path }}
          retention-days: 30

  # ═══════════════════════════════════════════════
  #  RELEASE — создаём GitHub Release со всеми файлами
  # ═══════════════════════════════════════════════
  release:
    name: 🚀 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [backend-load-test, frontend-build-exe, admin-build-exe]
    if: always() && (needs.frontend-build-exe.result == 'success' || needs.admin-build-exe.result == 'success')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ steps.sha.outputs.short }}
          name: "Release ${{ steps.sha.outputs.short }}"
          body: |
            ## 🚀 Автоматический релиз

            **Коммит:** ${{ github.sha }}
            **Дата:** ${{ github.event.head_commit.timestamp }}
            **Сообщение:** ${{ github.event.head_commit.message }}

            ### Содержимое:
            - 🖥️ Admin Panel — Windows (`.exe`, `.msi`) и Linux (`.deb`, `.AppImage`)
            - ⚛️ Frontend — Windows (`.exe`, `.msi`) и Linux (`.deb`, `.AppImage`)

            ### Нагрузочные тесты:
            Отчёт доступен в разделе **Actions → Artifacts**
          files: |
            release-assets/**/*.exe
            release-assets/**/*.msi
            release-assets/**/*.deb
            release-assets/**/*.AppImage
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}